<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>个人中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF6B35;
      --orange-dark: #E55A25;
      --red: #E74C3C;
      --green: #27AE60;
      --bg: #F7F8FC;
      --card-bg: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --text-light: #9CA3AF;
      --border: #EAEAEF;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 16px;
      --tabbar-h: 64px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text-primary); height: 100%; }
    body { padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom)); }

    /* === USER PROFILE === */
    .profile-header {
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
      padding: 32px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .profile-header::before {
      content: ''; position: absolute;
      top: -50px; right: -50px;
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.08); border-radius: 50%;
    }
    .profile-header::after {
      content: ''; position: absolute;
      bottom: -40px; left: -30px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.06); border-radius: 50%;
    }
    .avatar-wrap {
      position: relative; z-index: 1; margin-bottom: 10px;
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: white; padding: 3px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .avatar-placeholder {
      width: 100%; height: 100%; border-radius: 50%;
      background: linear-gradient(135deg, #FFD59E, #FFA726);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    .user-id {
      position: relative; z-index: 1;
      font-size: 12px; color: rgba(255,255,255,0.75);
      letter-spacing: 1px;
    }
    .user-name {
      position: relative; z-index: 1;
      font-size: 18px; font-weight: 800; color: white;
      margin-top: 4px;
    }
    .user-badge {
      position: relative; z-index: 1;
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.22); border-radius: 20px;
      padding: 4px 12px; font-size: 12px; color: white;
      margin-top: 8px;
    }

    /* === STATS ROW === */
    .stats-row {
      display: flex; background: white;
      margin: -20px 14px 0; border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative; z-index: 2;
      overflow: hidden;
    }
    .stat-item {
      flex: 1; padding: 16px 8px;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .stat-item + .stat-item {
      border-left: 1px solid var(--border);
    }
    .stat-num { font-size: 20px; font-weight: 900; color: var(--text-primary); }
    .stat-label { font-size: 11px; color: var(--text-secondary); }

    /* === SECTION === */
    .section-wrap { padding: 16px 14px 4px; }
    .section-title {
      font-size: 15px; font-weight: 700; color: var(--text-primary);
      padding: 0 2px; margin-bottom: 10px;
    }

    /* === ORDER LIST === */
    .order-card {
      background: white; border-radius: var(--radius);
      margin: 0 14px 10px; box-shadow: var(--shadow);
      overflow: hidden;
    }
    .order-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .order-no { font-size: 12px; color: var(--text-light); }
    .order-status {
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 12px;
    }
    .order-status.pending { background: #FFF3E0; color: #E67E22; }
    .order-status.paid { background: #E8F8EE; color: var(--green); }
    .order-status.done { background: #E3F2FD; color: #1976D2; }
    .order-card-body { padding: 12px 14px; }
    .order-goods-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .order-price-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px;
    }
    .order-price { font-size: 18px; font-weight: 900; color: var(--red); }
    .order-date { font-size: 11px; color: var(--text-light); margin-top: 4px; }
    .order-actions { display: flex; gap: 8px; padding: 10px 14px 12px; }
    .order-btn {
      flex: 1; padding: 8px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      border: none; text-align: center;
    }
    .order-btn-primary {
      background: linear-gradient(135deg, var(--orange) 0%, #FF8C42 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(255,107,53,0.3);
    }
    .order-btn-outline {
      background: white; color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    .order-empty {
      text-align: center; padding: 48px 0;
    }
    .order-empty-icon {
      font-size: 56px; margin-bottom: 12px;
    }
    .order-empty-text { font-size: 14px; color: var(--text-light); }
    .order-empty-sub { font-size: 12px; color: var(--text-light); margin-top: 6px; }

    /* === TAB BAR === */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--tabbar-h);
      background: white;
      display: flex; align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      z-index: 100;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; text-decoration: none; color: var(--text-light);
      transition: color 0.2s;
    }
    .tab-item.active { color: var(--red); }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-label { font-size: 11px; font-weight: 500; }

    /* === DELIVER MODAL === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; display: none;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: white; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
      animation: slide-up 0.3s ease;
    }
    @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 20px;
    }
    .modal-title { font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 16px; }
    .modal-content {
      background: var(--bg); border-radius: 12px;
      padding: 16px; font-size: 13px; color: var(--text-secondary);
      white-space: pre-wrap; line-height: 1.8;
      max-height: 300px; overflow-y: auto;
      margin-bottom: 16px;
    }
    .modal-btn {
      width: 100%; background: linear-gradient(135deg, var(--orange) 0%, #FF8C42 100%);
      color: white; border: none; border-radius: 30px;
      padding: 13px; font-size: 15px; font-weight: 800;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 20px rgba(255,107,53,0.35);
    }

    .loading-wrap { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<!-- PROFILE -->
<div class="profile-header">
  <div class="avatar-wrap">
    <div class="avatar">
      <div class="avatar-placeholder">🦉</div>
    </div>
  </div>
  <div class="user-id">KAOYAN VIP</div>
  <div class="user-name">考研学员</div>
  <div class="user-badge">
    <span>✦</span> 全年资料会员
    <span>✦</span>
  </div>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-item">
    <div class="stat-num" id="totalOrders">0</div>
    <div class="stat-label">全部订单</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="paidOrders">0</div>
    <div class="stat-label">已支付</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="deliveredOrders">0</div>
    <div class="stat-label">已发货</div>
  </div>
</div>

<!-- ORDER SECTION -->
<div class="section-wrap">
  <div class="section-title">📋 我的订单</div>
</div>

<div id="orderList">
  <div class="loading-wrap"><div class="spinner"></div></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <a class="tab-item" href="index.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span class="tab-label">店铺首页</span>
  </a>
  <a class="tab-item active" href="user.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    <span class="tab-label">个人中心</span>
  </a>
</div>

<!-- DELIVER MODAL -->
<div class="modal-overlay" id="deliverModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📦 订单发货内容</div>
    <div class="modal-content" id="modalContent">加载中...</div>
    <button class="modal-btn" onclick="copyContent()">📋 复制内容</button>
  </div>
</div>

<script>
/* ========================
   ⚠️ 在此处填写你的后端地址！
   Railway 部署成功后，将下面的占位符替换为你的 Railway 域名
   例如: const API_BASE = 'https://kaoyan-shop.up.railway.app';
   ======================== */
const API_BASE = 'https://你的railway域名.up.railway.app';
let currentDeliverContent = '';
let allOrders = [];

async function loadOrders() {
  const openid = localStorage.getItem('openid') || 'wechat_user_' + Date.now();
  try {
    const res = await fetch(`${API_BASE}/api/orders?openid=${encodeURIComponent(openid)}`);
    const json = await res.json();
    allOrders = json.data || [];

    const total = allOrders.length;
    const paid = allOrders.filter(o => o.status === 'paid').length;
    const delivered = allOrders.filter(o => o.deliver_content || o.status === 'done').length;
    document.getElementById('totalOrders').textContent = total;
    document.getElementById('paidOrders').textContent = paid;
    document.getElementById('deliveredOrders').textContent = delivered;

    const list = document.getElementById('orderList');
    if (allOrders.length === 0) {
      list.innerHTML = `
        <div class="order-card">
          <div class="order-empty">
            <div class="order-empty-icon">📦</div>
            <div class="order-empty-text">暂无订单记录</div>
            <div class="order-empty-sub">购买课程后，在此查看订单和发货内容</div>
          </div>
        </div>
      `;
      return;
    }

    list.innerHTML = allOrders.map(order => {
      const statusMap = {
        pending: { label: '待支付', cls: 'pending' },
        paid: { label: '已支付', cls: 'paid' },
        done: { label: '已发货', cls: 'done' }
      };
      const s = statusMap[order.status] || statusMap.pending;
      const dateStr = order.created_at ? order.created_at.slice(0, 16).replace('T', ' ') : '';
      const hasContent = order.deliver_content || order.status === 'done';
      return `
        <div class="order-card">
          <div class="order-card-header">
            <span class="order-no">订单号 ${order.order_no}</span>
            <span class="order-status ${s.cls}">${s.label}</span>
          </div>
          <div class="order-card-body">
            <div class="order-goods-name">${order.goods_title || '考研网盘云群'}</div>
            <div class="order-price-row">
              <div>
                <div class="order-price">¥${parseFloat(order.price || 0).toFixed(2)}</div>
                <div class="order-date">${dateStr}</div>
              </div>
            </div>
          </div>
          <div class="order-actions">
            ${order.status === 'pending' ? `
              <button class="order-btn order-btn-primary" onclick="rePay('${order.order_no}')">继续支付</button>
            ` : ''}
            ${(order.status === 'paid' || order.status === 'done' || hasContent) ? `
              <button class="order-btn order-btn-primary" onclick="viewDeliver('${order.order_no}')">查看发货</button>
            ` : ''}
            <button class="order-btn order-btn-outline" onclick="copyOrderNo('${order.order_no}')">复制单号</button>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    document.getElementById('orderList').innerHTML =
      '<div class="order-card"><div class="order-empty"><div class="order-empty-text">加载失败，请下拉刷新</div></div></div>';
  }
}

async function viewDeliver(orderNo) {
  document.getElementById('modalContent').textContent = '加载中...';
  document.getElementById('deliverModal').classList.add('show');
  try {
    const res = await fetch(`${API_BASE}/api/orders/${orderNo}/deliver`);
    const json = await res.json();
    if (json.code === 0) {
      currentDeliverContent = json.data.content || '暂无发货内容';
    } else {
      // 尝试从已有订单数据中找
      const order = allOrders.find(o => o.order_no === orderNo);
      currentDeliverContent = (order && order.deliver_content) || '暂无发货内容，联系客服领取。';
    }
    document.getElementById('modalContent').textContent = currentDeliverContent;
  } catch (e) {
    document.getElementById('modalContent').textContent = '加载失败，请稍后重试。';
  }
}

function copyContent() {
  navigator.clipboard.writeText(currentDeliverContent).then(() => {
    document.querySelector('#deliverModal .modal-btn').textContent = '✓ 已复制';
    setTimeout(() => {
      document.querySelector('#deliverModal .modal-btn').textContent = '📋 复制内容';
      document.getElementById('deliverModal').classList.remove('show');
    }, 1200);
  }).catch(() => {
    prompt('请手动复制以下内容：', currentDeliverContent);
  });
}

function copyOrderNo(orderNo) {
  navigator.clipboard.writeText(orderNo).then(() => {
    alert('订单号已复制');
  });
}

function rePay(orderNo) {
  window.location.href = 'index.html';
}

document.getElementById('deliverModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
});

loadOrders();
</script>
</body>
</html>
