<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>个人中心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --orange: #FF6B35; --red: #E74C3C; --green: #27AE60; --bg: #F7F8FC; --card: #FFF; --text: #1A1A2E; --sub: #6B7280; --light: #9CA3AF; --border: #EAEAEF; --shadow: 0 2px 12px rgba(0,0,0,0.06); --r: 16px; --tabbar: 64px; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html,body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); height: 100%; }
    body { padding-bottom: calc(var(--tabbar) + env(safe-area-inset-bottom)); }

    .profile { background: linear-gradient(135deg, #FF6B35, #FF8C42); padding: 32px 20px 40px; display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden; }
    .profile::before { content: ''; position: absolute; top: -50px; right: -50px; width: 220px; height: 220px; background: rgba(255,255,255,0.08); border-radius: 50%; }
    .profile::after { content: ''; position: absolute; bottom: -40px; left: -30px; width: 140px; height: 140px; background: rgba(255,255,255,0.06); border-radius: 50%; }
    .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #FFD59E, #FFA726); display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); position: relative; z-index: 1; }
    .user-id { font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 1px; position: relative; z-index: 1; margin-top: 10px; }
    .user-name { font-size: 18px; font-weight: 800; color: #fff; position: relative; z-index: 1; margin-top: 4px; }
    .user-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.22); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #fff; margin-top: 8px; position: relative; z-index: 1; }

    .stats { display: flex; background: #fff; margin: -20px 14px 0; border-radius: var(--r); box-shadow: var(--shadow); position: relative; z-index: 2; }
    .stat { flex: 1; padding: 16px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat + .stat { border-left: 1px solid var(--border); }
    .stat-num { font-size: 20px; font-weight: 900; }
    .stat-label { font-size: 11px; color: var(--sub); }

    .section { padding: 16px 14px 4px; }
    .section h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }

    .order-card { background: #fff; border-radius: var(--r); margin: 0 14px 10px; box-shadow: var(--shadow); overflow: hidden; }
    .order-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .order-no { font-size: 12px; color: var(--light); }
    .order-status { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; background: #E8F8EE; color: var(--green); }
    .order-body { padding: 12px 14px; }
    .order-title { font-size: 14px; font-weight: 700; }
    .order-price { font-size: 18px; font-weight: 900; color: var(--red); margin-top: 8px; }
    .order-date { font-size: 11px; color: var(--light); margin-top: 4px; }
    .order-actions { display: flex; gap: 8px; padding: 10px 14px 12px; }
    .order-btn { flex: 1; padding: 8px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; text-align: center; }
    .order-btn-primary { background: linear-gradient(135deg, var(--orange), #FF8C42); color: #fff; box-shadow: 0 4px 12px rgba(255,107,53,0.3); }
    .order-btn-outline { background: #fff; color: var(--sub); border: 1.5px solid var(--border); }
    .order-empty { text-align: center; padding: 48px 0; }
    .order-empty-icon { font-size: 56px; margin-bottom: 12px; }
    .order-empty-text { font-size: 14px; color: var(--light); }

    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tabbar); background: #fff; display: flex; align-items: center; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -2px 12px rgba(0,0,0,0.06); z-index: 100; }
    .tabbar a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--light); font-size: 11px; font-weight: 500; }
    .tabbar a.active { color: var(--red); }
    .tabbar svg { width: 24px; height: 24px; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal.show { display: flex; }
    .modal-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); animation: u 0.3s ease; }
    @keyframes u { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal h3 { font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 16px; }
    .modal-content { background: var(--bg); border-radius: 12px; padding: 16px; font-size: 13px; color: var(--sub); white-space: pre-wrap; line-height: 1.8; max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
    .modal-btn { width: 100%; background: linear-gradient(135deg, var(--orange), #FF8C42); color: #fff; border: none; border-radius: 30px; padding: 13px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; box-shadow: 0 6px 20px rgba(255,107,53,0.35); }
  </style>
</head>
<body>

<div class="profile">
  <div class="avatar">🦉</div>
  <div class="user-id">KAOYAN VIP</div>
  <div class="user-name">考研学员</div>
  <div class="user-badge"><span>✦</span> 全年资料会员 <span>✦</span></div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="totalOrders">0</div><div class="stat-label">全部订单</div></div>
  <div class="stat"><div class="stat-num" id="paidOrders">0</div><div class="stat-label">已支付</div></div>
  <div class="stat"><div class="stat-num" id="deliveredOrders">0</div><div class="stat-label">已发货</div></div>
</div>

<div class="section"><h2>📋 我的订单</h2></div>

<div id="orderList"></div>

<div class="tabbar">
  <a href="index.html"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>店铺首页</a>
  <a href="user.html" class="active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>个人中心</a>
</div>

<!-- Deliver Modal -->
<div class="modal" id="deliverModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3>📦 订单发货内容</h3>
    <div class="modal-content" id="modalContent">加载中...</div>
    <button class="modal-btn" onclick="copyContent()">📋 复制内容</button>
  </div>
</div>

<script>
function getOrders() { return JSON.parse(localStorage.getItem('kaoyan_orders') || '[]'); }
function saveOrders(orders) { localStorage.setItem('kaoyan_orders', JSON.stringify(orders)); }

function loadOrders() {
  const orders = getOrders();
  document.getElementById('totalOrders').textContent = orders.length;
  document.getElementById('paidOrders').textContent = orders.filter(o => o.status === 'paid').length;
  document.getElementById('deliveredOrders').textContent = orders.length;

  const list = document.getElementById('orderList');
  if (orders.length === 0) {
    list.innerHTML = '<div class="order-card"><div class="order-empty"><div class="order-empty-icon">📦</div><div class="order-empty-text">暂无订单记录</div></div></div>';
    return;
  }

  list.innerHTML = orders.map(order => `
    <div class="order-card">
      <div class="order-header">
        <span class="order-no">订单号 ${order.order_no}</span>
        <span class="order-status">已支付</span>
      </div>
      <div class="order-body">
        <div class="order-title">${order.goods_title}</div>
        <div class="order-price">¥${parseFloat(order.price).toFixed(2)}</div>
        <div class="order-date">${order.time}</div>
      </div>
      <div class="order-actions">
        <button class="order-btn order-btn-primary" onclick="viewDeliver('${order.deliver.replace(/'/g,"\\'")}')">查看发货</button>
        <button class="order-btn order-btn-outline" onclick="copyOrderNo('${order.order_no}')">复制单号</button>
      </div>
    </div>
  `).join('');
}

function viewDeliver(content) {
  document.getElementById('modalContent').textContent = content;
  document.getElementById('deliverModal').classList.add('show');
}

function copyContent() {
  const content = document.getElementById('modalContent').textContent;
  navigator.clipboard.writeText(content).then(() => {
    const btn = document.querySelector('.modal-btn');
    btn.textContent = '✓ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制内容'; document.getElementById('deliverModal').classList.remove('show'); }, 1200);
  });
}

function copyOrderNo(orderNo) {
  navigator.clipboard.writeText(orderNo).then(() => alert('订单号已复制'));
}

document.getElementById('deliverModal').addEventListener('click', e => { if(e.target.id==='deliverModal') document.getElementById('deliverModal').classList.remove('show'); });

loadOrders();
</script>
</body>
</html>
